services:
  autopilot:
    build: .
    image: devin-issue-runner:latest
    container_name: devin-issue-runner
    ports:
      - "8000:8000"
    env_file:
      # Optional: copy .env.example to .env to enable real mode. Adopt mode
      # works without any credentials.
      - path: .env
        required: false
    environment:
      # Falls back to RogueTex/superset if not set in .env
      GITHUB_REPO: ${GITHUB_REPO:-RogueTex/superset}
      DB_PATH: /app/data/autopilot.db
    volumes:
      - autopilot-data:/app/data
    restart: unless-stopped

volumes:
  autopilot-data:
